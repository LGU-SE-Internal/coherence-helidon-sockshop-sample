name: Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  REGISTRY_NAMESPACE: opspai

jobs:
  compute-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: tag
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          echo "tag=${DATE}-${SHA}" >> "$GITHUB_OUTPUT"

  backends:
    needs: compute-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build + push backends via Jib
        env:
          TAG: ${{ needs.compute-tag.outputs.tag }}
          DOCKER_USER: ${{ secrets.DOCKER_REGISTRY_LOGIN }}
          DOCKER_PASS: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          mvn -B package -Pcontainer -DskipTests \
            -Djib.goal=build \
            -Ddocker.registry.url=${REGISTRY} \
            -Ddocker.registry.name=${REGISTRY_NAMESPACE} \
            -Ddocker.image.tag=${TAG} \
            -Djib.to.tags=${TAG},latest \
            -Ddocker.registry.username=${DOCKER_USER} \
            -Ddocker.registry.password=${DOCKER_PASS}

  frontend:
    needs: compute-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_LOGIN }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/ss-frontend:${{ needs.compute-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/ss-frontend:latest

  loadgen:
    needs: compute-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_LOGIN }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: loadgen
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/ss-loadgen:${{ needs.compute-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/ss-loadgen:latest
