# Default values for sockshop Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  # Docker image registry — defaults to the aegis-published public namespace
  # so the chart works on a fresh cluster without extra pull secrets.
  imageRegistry: "docker.io/opspai"
  # Global image tag - applies to all backend services unless overridden.
  # The CI publishes YYYYMMDD-<sha> + `latest`; pin the former in production.
  imageTag: "latest"
  # Image pull policy
  imagePullPolicy: IfNotPresent
  # Coherence cluster name
  coherenceCluster: "SockShop"

# OpenTelemetry configuration — values-driven so the chart can run against
# different cluster layouts (aegis kind, Descartes lab, etc.) without patching
# templates.
otel:
  # OTLP gRPC collector endpoint used by the frontend (Node SDK) and wrapper
  # defaults for the Java backends.
  collectorEndpoint: "http://opentelemetry-kube-stack-deployment-collector.monitoring:4317"
  # Instrumentation CR (namespace/name) used to auto-inject the OpenTelemetry
  # Java agent into Coherence pods via `inject-java` annotation. Leave empty
  # to skip the annotation entirely.
  instrumentation: "monitoring/opentelemetry-kube-stack"

# Frontend configuration
frontend:
  enabled: true
  name: front-end
  replicas: 1
  image:
    repository: ss-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    # ClusterIP keeps kind happy (no LB provider); fault injection is
    # pod-label targeted so external access is not required.
    type: ClusterIP
    port: 80
    targetPort: 8079
  resources:
    requests:
      cpu: 100m
      memory: 400Mi
    limits:
      cpu: 1000m
      memory: 400Mi
  env:
    # Optional frontend-specific override. When empty, falls back to
    # `otel.collectorEndpoint`.
    otelExporterEndpoint: ""
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    # Upstream's readOnlyRootFilesystem breaks the Node container (npm cache
    # needs to be writable). Let the pod write to /tmp via emptyDir rather
    # than fight the root-fs lock.
    readOnlyRootFilesystem: false

# Load generator configuration
loadgen:
  enabled: true
  name: loadgen
  replicas: 1
  image:
    repository: ss-loadgen
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8089
    targetPort: 8089
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Load generation settings
  load:
    users: 10
    spawnRate: 5
    # Set runTime to empty string for continuous load generation
    runTime: ""
    # Same-namespace service discovery keeps parallel installs (sockshop0,
    # sockshop1, ...) working without a hardcoded namespace-qualified DNS name.
    targetHost: "http://front-end"
    minWait: 1
    maxWait: 3
  # Configuration file content
  config:
    scenarios:
      light:
        users: 10
        spawn_rate: 2
        run_time: "5m"
        description: "Light load scenario for basic testing and validation"
      medium:
        users: 50
        spawn_rate: 5
        run_time: "15m"
        description: "Medium load scenario for typical production traffic"
      heavy:
        users: 200
        spawn_rate: 10
        run_time: "30m"
        description: "Heavy load scenario for stress testing"
      spike:
        users: 500
        spawn_rate: 50
        run_time: "10m"
        description: "Spike test to verify system resilience under sudden load"
    api_weights:
      browse_catalogue: 40
      view_product_details: 30
      user_login_flow: 10
      shopping_cart: 15
      place_order: 5
    user_behavior:
      min_wait: 1.0
      max_wait: 3.0
      probabilities:
        view_image: 0.5
        register_on_login_fail: 0.3
        add_to_cart: 0.7
        modify_cart_item: 0.2
        delete_vs_update: 0.5

# Backend services configuration
# Common settings for all Coherence-based microservices
coherence:
  # Common JVM settings
  jvm:
    memory:
      heapSize: 2g
    args:
      - "-Dhelidon.serialFilter.ignoreFiles=true"
      - "-Dhelidon.serialFilter.pattern=*"
      - "-Dhelidon.serialFilter.failure.action=WARN"
  # Coherence settings
  metrics:
    enabled: true
  # Readiness probe settings
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  # Service monitor settings — requires prometheus-operator CRDs, which most
  # aegis clusters don't install. Off by default to keep the first install
  # from failing on unknown kind.
  serviceMonitor:
    enabled: false

# Carts service
carts:
  enabled: true
  name: carts
  replicas: 1
  image:
    repository: ss-carts
    tag: ""  # Uses global.imageTag if not specified
  service:
    name: carts
    port: 80

# Catalog service
catalog:
  enabled: true
  name: catalog
  replicas: 1
  image:
    repository: ss-catalog
    tag: ""  # Uses global.imageTag if not specified
  service:
    # Use "catalogue" for compatibility with the existing front-end
    name: catalogue
    port: 80

# Orders service
orders:
  enabled: true
  name: orders
  replicas: 1
  image:
    repository: ss-orders
    tag: ""  # Uses global.imageTag if not specified
  service:
    name: orders
    port: 80

# Payment service
payment:
  enabled: true
  name: payment
  replicas: 1
  image:
    repository: ss-payment
    tag: ""  # Uses global.imageTag if not specified
  service:
    name: payment
    port: 80

# Shipping service
shipping:
  enabled: true
  name: shipping
  replicas: 1
  image:
    repository: ss-shipping
    tag: ""  # Uses global.imageTag if not specified
  service:
    name: shipping
    port: 80

# Users service
users:
  enabled: true
  name: users
  replicas: 1
  image:
    repository: ss-users
    tag: ""  # Uses global.imageTag if not specified
  service:
    name: user
    port: 80
